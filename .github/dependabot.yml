version: 2

updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 15
    groups:
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"
      serilog:
        patterns:
          - "Serilog.*"
      blazor-ui:
        patterns:
          - "Blazorise.*"
          - "Syncfusion.*"
      nethereum:
        patterns:
          - "Nethereum.*"
      testing:
        patterns:
          - "Microsoft.NET.Test.Sdk"
          - "MSTest.*"
          - "Moq"
          - "coverlet.*"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: npm
    directory: "/Texnomic.ENS.Infrastructure"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      include: "scope"